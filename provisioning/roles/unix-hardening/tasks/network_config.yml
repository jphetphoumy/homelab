---
- name: Configure network parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
  with_items: "{{ network_params }}"

- name: Disable unused filesystems
  lineinfile:
    path: /etc/modprobe.d/blacklist.conf
    line: "install {{ item }} /bin/true"
    create: yes
  with_items: "{{ unused_filesystems }}"
