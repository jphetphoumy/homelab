---
- name: Copy Dockerfile on remote host
  ansible.builtin.template:
    src: Dockerfile.jenkins-agent.j2
    dest: /root/Dockerfile
    owner: root
    group: root
    mode: "0644"
  when: "jenkins_master is defined and jenkins_master == False"

- name: Build custom image
  community.docker.docker_image_build:
    name: jenkins-agent
    path: /root
    dockerfile: Dockerfile
  when: "jenkins_master is defined and jenkins_master == False"

- name: Create jenkins-docker
  community.docker.docker_container:
    name: jenkins-agent
    image: jenkins-agent
    detach: true
    env:
      DOCKER_TLS_CERTDIR: /certs
      JENKINS_AGENT_SSH_PUBKEY: "{{ hostvars['runick'].jenkins_pub_key }}"
    published_ports:
      - "4444:22"
  when: "jenkins_master is defined and jenkins_master == False"
