---
- name: Create user
  ansible.builtin.user:
    name: "{{ common_admin_user }}"
    comment: Admin user
    create_home: true
    shell: /bin/bash
  when: common_admin_user is defined

- name: Add user to sudoers
  community.general.sudoers:
    name: "{{ common_admin_user }}"
    state: present
    user: "{{ common_admin_user }}"
    runas: root
    commands: ALL
