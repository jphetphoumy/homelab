---
# tasks file for bind9
- name: Install bind9
  ansible.builtin.apt:
    name: bind9
    state: present

- name: Copy zone to remote server
  ansible.builtin.template:
    src: db.j2
    dest: /etc/bind/db.homelab
    owner: root
    group: root 
    mode: '0644'
  notify:
    - restart bind9

- name: Update named.conf.local 
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: root 
    mode: '0644'
  notify:
    - restart bind9
