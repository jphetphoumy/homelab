- name: Deploy k3s
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: 0755

- name: Update /boot/cmdline.txt
  become: true
  ansible.builtin.copy:
    dest: /boot/cmdline.txt
    content: |
      console=serial0,115200 console=tty1 root=PARTUUID=9578a071-02 rootfstype=ext4 elevator=deadline fsck.repair=yes rootwait cgroup_memory=1 cgroup_enable=memory

- name: reboot
  become: true
  ansible.builtin.reboot:
    post_reboot_delay: 30
    test_command: "whoami"

- name: Execute k3s_install.sh
  become: true
  ansible.builtin.shell: /tmp/k3s_install.sh
  run_once: true

